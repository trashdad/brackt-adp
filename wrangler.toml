name = "brackt-adp"
pages_build_output_dir = "dist"
compatibility_date = "2025-01-01"

# ── KV namespace ──────────────────────────────────────────────────────────────
# For LOCAL dev only — add after creating a namespace:
#   wrangler kv namespace create BRACKT_KV
# Then uncomment and fill in the real IDs:
#
# [[kv_namespaces]]
#   binding    = "BRACKT_KV"
#   id         = "<production-namespace-id>"
#   preview_id = "<preview-namespace-id>"
#
# For PRODUCTION: bind BRACKT_KV in the CF Pages dashboard under
#   Settings → Functions → KV namespace bindings.
#
# ── API key secrets ───────────────────────────────────────────────────────────
# Set in CF Pages dashboard → Settings → Environment variables, or:
#   wrangler pages secret put THE_ODDS_API_KEY
#   wrangler pages secret put ODDS_API_IO_KEY
#   wrangler pages secret put API_SPORTS_KEY
