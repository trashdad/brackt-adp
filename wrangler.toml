name = "brackt-adp"
main = "worker.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# ── KV namespace ──────────────────────────────────────────────────────────────
[[kv_namespaces]]
  binding = "BRACKT_KV"
  id      = "f6bda5e8d29e4905b99933566bc6def1"

# ── API key secrets ───────────────────────────────────────────────────────────
# Set in CF dashboard → Settings → Variables & Secrets, or:
#   wrangler secret put THE_ODDS_API_KEY
#   wrangler secret put ODDS_API_IO_KEY
#   wrangler secret put API_SPORTS_KEY
